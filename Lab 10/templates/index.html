<!DOCTYPE html>
<html>
<head>
    <title>AI Stylist Bot</title>
    <style>
        body { background: #faf9f6; font-family: 'Arial', sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .window { width: 350px; background: white; border: 1px solid #ddd; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .header { background: #1a1a1a; color: white; padding: 20px; text-align: center; font-weight: bold; }
        #display { height: 350px; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .box { margin: 8px 0; padding: 10px; border-radius: 12px; font-size: 14px; max-width: 85%; }
        .u-box { background: #efefef; align-self: flex-end; }
        .b-box { background: #1a1a1a; color: white; align-self: flex-start; }
        .input-box { display: flex; padding: 15px; border-top: 1px solid #eee; }
        input { flex: 1; border: none; outline: none; background: #f5f5f5; padding: 10px; border-radius: 5px; }
        button { background: none; border: none; font-weight: bold; color: #1a1a1a; cursor: pointer; margin-left: 10px; }
    </style>
</head>
<body>

<div class="window">
    <div class="header">AESTHETIC AI STYLIST</div>
    <div id="display"></div>
    <div class="input-box">
        <input type="text" id="msg" placeholder="What's the vibe today?">
        <button onclick="ask()">Ask</button>
    </div>
</div>

<script>
    function ask() {
        let txt = document.getElementById("msg").value;
        if(!txt) return;

        let screen = document.getElementById("display");
        screen.innerHTML += `<div class="box u-box">${txt}</div>`;
        document.getElementById("msg").value = "";

        fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text: txt})
        })
        .then(res => res.json())
        .then(data => {
            screen.innerHTML += `<div class="box b-box">${data.reply}</div>`;
            screen.scrollTop = screen.scrollHeight;
        });
    }
</script>

</body>
</html>
