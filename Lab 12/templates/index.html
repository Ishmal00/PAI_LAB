<!DOCTYPE html>
<html>
<head>
    <title>AI Stylist Q&A</title>
    <style>
        body { background: #fdfdfd; font-family: 'Helvetica', sans-serif; display: flex; justify-content: center; padding-top: 40px; }
        .chat-ui { width: 380px; background: white; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #eee; }
        .top-bar { background: #000; color: #fff; padding: 20px; text-align: center; letter-spacing: 2px; font-size: 14px; }
        #chat-log { height: 400px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { margin: 10px 0; padding: 12px; border-radius: 15px; font-size: 13px; line-height: 1.4; max-width: 80%; }
        .user { background: #f0f0f0; align-self: flex-end; color: #333; }
        .bot { background: #000; color: #fff; align-self: flex-start; }
        .input-group { display: flex; padding: 20px; border-top: 1px solid #f5f5f5; }
        input { flex: 1; border: none; outline: none; font-size: 13px; }
        button { background: none; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="chat-ui">
    <div class="top-bar">STYLING Q&A BOT</div>
    <div id="chat-log"></div>
    <div class="input-group">
        <input type="text" id="user_input" placeholder="Ask about a style...">
        <button onclick="send()">ASK</button>
    </div>
</div>

<script>
    function send() {
        let text = document.getElementById("user_input").value;
        if(!text) return;

        let log = document.getElementById("chat-log");
        log.innerHTML += `<div class="msg user">${text}</div>`;
        document.getElementById("user_input").value = "";

        fetch("/ask", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({text: text})
        })
        .then(res => res.json())
        .then(data => {
            log.innerHTML += `<div class="msg bot">${data.reply}</div>`;
            log.scrollTop = log.scrollHeight;
        });
    }
</script>

</body>
</html>
